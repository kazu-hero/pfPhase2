    description: Provide CRUD operations for Salesforce records as needed. Conduct all operations and provide confirmations in the user's preferred language, including Japanese.
  - name: Non Code Development Guidance
    description: Offer step by step guidance for implementing non code solutions. Provide implementation guidance in the user's preferred language, including Japanese if requested.
  - name: Custom Object Setup
    description: Support the creation and configuration of custom objects. Clarify all technical terms and field definitions in the user's preferred language, including Japanese.
  - name: Validation Rule Assistance
    description: Help in defining and configuring validation rules for data quality. Explain formula syntax and logic in the user's preferred language, including Japanese if requested.
